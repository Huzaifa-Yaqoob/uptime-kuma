name: "Azure Deploy"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Set up emulation engines for multi-arch builds (AMD64 & ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up the Buildx engine
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log directly into Azure
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      # Use Node.js to compile the Go binaries first (the Dockerfile expects pre-built binaries)
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Go
        uses: actions/setup-go@v5

      - name: Install cross-env
        run: npm install -g cross-env

      - name: Build Go binaries
        working-directory: extra/uptime-kuma-push
        run: npm run build-all

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: extra/uptime-kuma-push
          file: extra/uptime-kuma-push/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_URL }}/uptime-kuma-push:latest
