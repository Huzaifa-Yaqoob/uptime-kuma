name: "Azure Deploy"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Step 1: Set up Node.js to compile Uptime Kuma's frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Step 2: Install dependencies and compile the production build folder
      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      # Step 3: Set up emulation for multi-architecture builds (AMD64 & ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Step 4: Set up the Docker Buildx builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Authenticate with your Azure Container Registry
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      # Step 6: Build and push utilizing the root context
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: . 
          file: extra/uptime-kuma-push/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_URL }}/uptime-kuma-push:latest
