name: "Azure Deploy"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 1: Install dependencies and compile assets specifically for the push package
      - name: Build push package assets
        working-directory: extra/uptime-kuma-push
        run: |
          npm ci
          npm run build

      # Step 2: Set up container builders
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Authenticate with Azure
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      # Step 4: Build using the isolated subfolder context where the new ./build folder lives
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: extra/uptime-kuma-push
          file: extra/uptime-kuma-push/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_URL }}/uptime-kuma-push:latest
