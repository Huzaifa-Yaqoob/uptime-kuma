name: Trigger auto deployment for uptimekuma

on:
  push:
    branches:
      - master
    paths:
      - '**'
      - '.github/workflows/uptimekuma-AutoDeployTrigger-b190005a-1a23-43c5-8b96-da160ca874d5.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      # Updated from v2 to v4 to fix the Node 20 deprecation warning
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.UPTIMEKUMA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.UPTIMEKUMA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.UPTIMEKUMA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
            # 1. Set this back to the root so Docker can find package.json
            appSourcePath: ${{ github.workspace }}

            # 2. Tell it exactly where the Dockerfile lives relative to the root
            dockerfilePath: docker/Dockerfile

            registryUrl: uptimekuma1.azurecr.io
            registryUsername: ${{ secrets.UPTIMEKUMA_REGISTRY_USERNAME }}
            registryPassword: ${{ secrets.UPTIMEKUMA_REGISTRY_PASSWORD }}
            containerAppName: uptimekuma
            resourceGroup: DefaultResourceGroup-CCAN
            imageToBuild: uptimekuma1.azurecr.io/uptimekuma:${{ github.sha }}
